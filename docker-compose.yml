version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: health-planner-db-compose
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: health_planner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: health-planner-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/health_planner?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-super-secret-key-change-in-production}
      - NEXTAUTH_URL=http://localhost:3000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
